    <title>Return 2D - Motor de Juegos</title>

      /* Custom scrollbar for a more modern look */
      ::-webkit-scrollbar {
        width: 8px;

      }

  <script type="importmap">
{
  "imports": {
    "react/": "https://aistudiocdn.com/react@^18.2.0/",
    "react": "https://aistudiocdn.com/react@^18.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^18.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.29.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <!-- This application is a single-page app powered by React. All logic is handled in the /index.tsx file. -->
  <body class="bg-black text-white">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          // Construct the full path to the service worker to avoid cross-origin and invalid URL errors.
          // This method is robust for various hosting environments.
          const path = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
          const swUrl = window.location.origin + path + 'service-worker.js';

          navigator.serviceWorker.register(swUrl).then(function(registration) {
            console.log('Service Worker registration successful with scope: ', registration.scope);
          }, function(err) {
            console.log('Service Worker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
